<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>CHATBOT</title>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f3ed;
      --bg-2: #eef6f2;
      --surface: #fffdf9;
      --surface-soft: #f3f8f5;
      --ink: #202522;
      --muted: #66726c;
      --line: #ddd6cb;
      --brand: #317d72;
      --brand-strong: #24645c;
      --accent: #b95f4a;
      --accent-soft: #faece6;
      --user: #335a69;
      --user-ink: #ffffff;
      --bot: #ffffff;
      --shadow: 0 22px 60px rgba(68, 54, 38, .14);
      --radius: 8px;
      font-family: "Noto Sans TC", "Microsoft JhengHei", "PingFang TC", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    [data-theme="dark"] {
      color-scheme: dark;
      --bg: #161b19;
      --bg-2: #1e2926;
      --surface: #222925;
      --surface-soft: #1b2421;
      --ink: #f5f1ea;
      --muted: #b8c2bc;
      --line: #39423e;
      --brand: #70c4b9;
      --brand-strong: #9adbd3;
      --accent: #e28b71;
      --accent-soft: #37241f;
      --user: #d9eeef;
      --user-ink: #15211f;
      --bot: #27302c;
      --shadow: 0 22px 60px rgba(0, 0, 0, .34);
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      color: var(--ink);
      background: linear-gradient(135deg, var(--bg) 0%, var(--bg-2) 56%, #f9eee7 100%);
    }
    button, textarea { font: inherit; }
    button { color: inherit; }

    .app {
      min-height: 100svh;
      display: grid;
      grid-template-columns: minmax(276px, 330px) minmax(0, 1fr);
      gap: 16px;
      padding: 16px;
    }

    .sidebar, .chat {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: color-mix(in srgb, var(--surface) 94%, transparent);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .sidebar {
      min-height: calc(100svh - 32px);
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .avatar {
      width: 56px;
      height: 56px;
      flex: 0 0 56px;
      border-radius: var(--radius);
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(135deg, var(--brand), #213d48);
      box-shadow: inset 0 -14px 24px rgba(0, 0, 0, .18);
      font-weight: 800;
      letter-spacing: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: 1.28rem;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .presence {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-top: 7px;
      color: var(--muted);
      font-size: .9rem;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--brand);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--brand) 16%, transparent);
    }

    .mood {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-soft);
      padding: 13px;
      line-height: 1.6;
      color: var(--muted);
    }

    .mood strong {
      display: block;
      margin-bottom: 4px;
      color: var(--ink);
      font-size: .96rem;
    }

    .quick-panel { display: grid; gap: 10px; }
    .panel-title {
      margin: 0;
      color: var(--muted);
      font-size: .82rem;
      font-weight: 700;
    }
    .chips { display: grid; gap: 8px; }

    .chip {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 9px 11px;
      text-align: left;
      cursor: pointer;
      transition: transform .16s ease, border-color .16s ease, background .16s ease;
    }

    .chip:hover {
      transform: translateY(-1px);
      border-color: color-mix(in srgb, var(--brand) 55%, var(--line));
      background: color-mix(in srgb, var(--surface-soft) 82%, var(--brand) 8%);
    }

    .actions {
      margin-top: auto;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .icon-button, .send {
      border: 0;
      border-radius: var(--radius);
      cursor: pointer;
      display: inline-grid;
      place-items: center;
      transition: transform .16s ease, background .16s ease, border-color .16s ease, opacity .16s ease;
    }

    .icon-button {
      width: 42px;
      height: 42px;
      border: 1px solid var(--line);
      background: var(--surface);
    }

    .icon-button:hover, .icon-button.active {
      transform: translateY(-1px);
      border-color: color-mix(in srgb, var(--brand) 58%, var(--line));
      background: color-mix(in srgb, var(--surface-soft) 86%, var(--brand) 10%);
    }

    .icon-button:disabled, .send:disabled {
      cursor: not-allowed;
      opacity: .58;
      transform: none;
    }

    .icon-button svg, .send svg {
      width: 20px;
      height: 20px;
      stroke-width: 2;
    }

    [data-lucide] {
      font-style: normal;
      font-size: .86rem;
      font-weight: 700;
      letter-spacing: 0;
    }

    .chat {
      min-height: calc(100svh - 32px);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      overflow: hidden;
    }

    .chat-header {
      min-height: 74px;
      border-bottom: 1px solid var(--line);
      padding: 13px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: color-mix(in srgb, var(--surface) 88%, var(--surface-soft));
    }

    .chat-title { min-width: 0; }
    .chat-title h2 {
      margin: 0;
      font-size: 1.05rem;
      letter-spacing: 0;
    }

    .status {
      margin-top: 4px;
      color: var(--muted);
      font-size: .86rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: min(58vw, 720px);
    }

    .header-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex: 0 0 auto;
    }

    .messages {
      padding: 18px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    .message {
      display: grid;
      gap: 6px;
      width: fit-content;
      max-width: min(760px, 86%);
      animation: lift .2s ease both;
    }

    .message.user { align-self: flex-end; justify-items: end; }
    .message.bot, .message.system { align-self: flex-start; }

    .meta {
      color: var(--muted);
      font-size: .78rem;
      padding-inline: 4px;
    }

    .bubble {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 11px 13px;
      line-height: 1.7;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .user .bubble {
      color: var(--user-ink);
      border-color: color-mix(in srgb, var(--user) 82%, #000);
      background: var(--user);
    }

    .bot .bubble { background: var(--bot); }
    .system .bubble {
      background: var(--accent-soft);
      border-color: color-mix(in srgb, var(--accent) 42%, var(--line));
    }

    .typing {
      width: fit-content;
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 13px;
    }

    .typing span {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--brand);
      animation: pulse 1s infinite ease-in-out;
    }
    .typing span:nth-child(2) { animation-delay: .14s; }
    .typing span:nth-child(3) { animation-delay: .28s; }

    .composer {
      border-top: 1px solid var(--line);
      padding: 13px;
      background: color-mix(in srgb, var(--surface) 88%, var(--surface-soft));
    }

    .composer form {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 10px;
      align-items: end;
    }

    .input-wrap {
      min-height: 52px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      display: grid;
      align-items: center;
    }

    textarea {
      width: 100%;
      max-height: 160px;
      min-height: 50px;
      resize: none;
      border: 0;
      outline: 0;
      color: var(--ink);
      background: transparent;
      padding: 14px 15px;
      line-height: 1.45;
    }

    textarea::placeholder { color: color-mix(in srgb, var(--muted) 82%, transparent); }

    .send {
      min-width: 52px;
      height: 52px;
      color: #fff;
      background: var(--brand);
    }
    .send:hover { transform: translateY(-1px); background: var(--brand-strong); }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      max-width: min(460px, calc(100vw - 36px));
      border: 1px solid color-mix(in srgb, var(--brand) 35%, var(--line));
      border-radius: var(--radius);
      color: var(--ink);
      background: var(--surface);
      box-shadow: var(--shadow);
      padding: 12px 13px;
      line-height: 1.55;
      transform: translateY(20px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
      z-index: 20;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @keyframes pulse {
      0%, 80%, 100% { opacity: .38; transform: translateY(0); }
      40% { opacity: 1; transform: translateY(-3px); }
    }

    @keyframes lift {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 860px) {
      .app { grid-template-columns: 1fr; padding: 0; gap: 0; }
      .sidebar {
        min-height: auto;
        border-radius: 0;
        border-width: 0 0 1px;
        box-shadow: none;
        padding: 13px;
      }
      .mood, .quick-panel { display: none; }
      .actions { margin-top: 0; position: absolute; right: 13px; top: 13px; }
      .chat { min-height: calc(100svh - 83px); border-radius: 0; border-width: 0; box-shadow: none; }
      .message { max-width: 94%; }
      .messages { padding: 14px; }
    }

    @media (max-width: 560px) {
      .brand h1 { font-size: 1.08rem; }
      .presence { font-size: .82rem; }
      .chat-header { min-height: 68px; align-items: flex-start; }
      .status { max-width: 54vw; }
      .composer form { grid-template-columns: auto minmax(0, 1fr) auto; gap: 8px; }
      .icon-button { width: 40px; height: 40px; }
      .composer .icon-button { width: 48px; height: 52px; }
      textarea { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="sidebar" aria-label="CHATBOT">
      <div class="brand">
        <div class="avatar" aria-hidden="true">C</div>
        <div>
          <h1>CHATBOT</h1>
          <div class="presence"><span class="dot" aria-hidden="true"></span><span id="presenceText">準備陪你聊聊</span></div>
        </div>
      </div>

      <section class="mood" aria-label="CHATBOT 狀態">
        <strong>今天也在這裡</strong>
        你可以談生活、心情、學習與教育學。CHATBOT 會用溫和、清楚、帶一點幽默的方式回應。
      </section>

      <section class="quick-panel" aria-labelledby="promptTitle">
        <p class="panel-title" id="promptTitle">常用開場</p>
        <div class="chips">
          <button class="chip" type="button" data-prompt="我今天有點累，想聽你用輕鬆的方式安慰我。">我今天有點累，想聽你用輕鬆的方式安慰我。</button>
          <button class="chip" type="button" data-prompt="請用簡單例子說明建構主義學習理論。">請用簡單例子說明建構主義學習理論。</button>
          <button class="chip" type="button" data-prompt="幫我把一件煩心事換個角度想。">幫我把一件煩心事換個角度想。</button>
          <button class="chip" type="button" data-prompt="給我一個適合學生的幽默暖心小故事。">給我一個適合學生的幽默暖心小故事。</button>
        </div>
      </section>

      <div class="actions" aria-label="對話工具">
        <button class="icon-button" id="themeButton" type="button" title="切換深色模式" aria-label="切換深色模式"><i data-lucide="moon" aria-hidden="true">月</i></button>
        <button class="icon-button" id="clearButton" type="button" title="清除畫面對話" aria-label="清除畫面對話"><i data-lucide="trash-2" aria-hidden="true">清</i></button>
      </div>
    </aside>

    <section class="chat" aria-label="CHATBOT 對話">
      <header class="chat-header">
        <div class="chat-title">
          <h2>對話室</h2>
          <div class="status" id="statusText">安全連線中</div>
        </div>
        <div class="header-actions">
          <button class="icon-button" id="copyButton" type="button" title="複製對話" aria-label="複製對話"><i data-lucide="copy" aria-hidden="true">複</i></button>
        </div>
      </header>

      <div class="messages" id="messages" aria-live="polite"></div>

      <div class="composer">
        <form id="chatForm">
          <button class="icon-button" id="voiceButton" type="button" title="語音輸入" aria-label="語音輸入"><i data-lucide="mic" aria-hidden="true">語</i></button>
          <label class="sr-only" for="chatInput">輸入訊息</label>
          <div class="input-wrap">
            <textarea id="chatInput" rows="1" autocomplete="off" placeholder="和 CHATBOT 說點什麼..."></textarea>
          </div>
          <button class="send" id="sendButton" type="submit" aria-label="送出"><i data-lucide="send-horizontal" aria-hidden="true">送</i></button>
        </form>
      </div>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const GAS_ENDPOINT = "https://script.google.com/macros/s/AKfycby-_2s_zbO0mDiAyi-caqAdZxteO5gbLrXBit5jDqplk4wAQUkQ3iQtKlnJZ19CFczz/exec";
    const STORAGE_KEY = "chatbot-conversation-v2";
    const SESSION_KEY = "chatbot-session-id-v1";
    const THEME_KEY = "chatbot-theme-v1";

    const messagesEl = document.querySelector("#messages");
    const inputEl = document.querySelector("#chatInput");
    const formEl = document.querySelector("#chatForm");
    const sendButton = document.querySelector("#sendButton");
    const voiceButton = document.querySelector("#voiceButton");
    const statusText = document.querySelector("#statusText");
    const presenceText = document.querySelector("#presenceText");
    const toastEl = document.querySelector("#toast");

    const dateTimeFormatter = new Intl.DateTimeFormat("zh-TW", {
      year: "numeric",
      month: "2-digit",
      day: "2-digit",
      hour: "2-digit",
      minute: "2-digit",
      second: "2-digit",
      hour12: false
    });

    let messages = loadMessages();
    let isSending = false;
    let recognition = null;
    let isListening = false;
    let voiceBaseText = "";

    init();

    function init() {
      if (window.lucide) {
        window.lucide.createIcons();
      } else {
        window.addEventListener("load", () => window.lucide && window.lucide.createIcons(), { once: true });
      }

      const savedTheme = localStorage.getItem(THEME_KEY);
      if (savedTheme) document.documentElement.dataset.theme = savedTheme;

      if (!messages.length) {
        messages.push({
          role: "bot",
          content: "嗨，我是 CHATBOT。今天想聊心情、學習、教育學，或只是想讓我講點不冷不熱的笑話都可以。我會認真聽，也會努力不把笑點講到需要補考。",
          time: new Date().toISOString()
        });
        saveMessages();
      }

      renderMessages();
      bindEvents();
      setupSpeechRecognition();
      autosizeInput();
    }

    function bindEvents() {
      formEl.addEventListener("submit", handleSubmit);
      inputEl.addEventListener("input", autosizeInput);
      inputEl.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          formEl.requestSubmit();
        }
      });

      document.querySelectorAll("[data-prompt]").forEach((button) => {
        button.addEventListener("click", () => {
          inputEl.value = button.dataset.prompt;
          autosizeInput();
          inputEl.focus();
        });
      });

      document.querySelector("#clearButton").addEventListener("click", () => {
        messages = [{ role: "bot", content: "畫面已整理好。新的對話可以從任何一句話開始，我會接住。", time: new Date().toISOString() }];
        saveMessages();
        renderMessages();
        showToast("畫面對話已清除");
      });

      document.querySelector("#themeButton").addEventListener("click", () => {
        const nextTheme = document.documentElement.dataset.theme === "dark" ? "" : "dark";
        document.documentElement.dataset.theme = nextTheme;
        if (nextTheme) localStorage.setItem(THEME_KEY, nextTheme);
        else localStorage.removeItem(THEME_KEY);
      });

      document.querySelector("#copyButton").addEventListener("click", async () => {
        const text = messages.map((item) => `${formatDateTime(item.time)} ${speakerName(item.role)}：${item.content}`).join("\n\n");
        try {
          await navigator.clipboard.writeText(text);
          showToast("對話已複製");
        } catch (error) {
          showToast("目前無法複製，請稍後再試");
        }
      });
    }

    function setupSpeechRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        voiceButton.disabled = true;
        voiceButton.title = "目前瀏覽器不支援語音輸入";
        voiceButton.setAttribute("aria-label", "目前瀏覽器不支援語音輸入");
        return;
      }

      recognition = new SpeechRecognition();
      recognition.lang = "zh-TW";
      recognition.interimResults = true;
      recognition.continuous = false;

      voiceButton.addEventListener("click", () => {
        if (isListening) {
          recognition.stop();
          return;
        }
        voiceBaseText = inputEl.value.trim();
        try {
          recognition.start();
        } catch (error) {
          showToast("語音輸入暫時無法啟動");
        }
      });

      recognition.addEventListener("start", () => {
        isListening = true;
        voiceButton.classList.add("active");
        setStatus("正在聆聽");
        showToast("正在聆聽，說完後會自動填入文字");
      });

      recognition.addEventListener("result", (event) => {
        let transcript = "";
        for (let index = event.resultIndex; index < event.results.length; index += 1) {
          transcript += event.results[index][0].transcript;
        }
        const prefix = voiceBaseText ? `${voiceBaseText} ` : "";
        inputEl.value = `${prefix}${transcript}`.trimStart();
        autosizeInput();
      });

      recognition.addEventListener("end", () => {
        isListening = false;
        voiceButton.classList.remove("active");
        setStatus("安全連線中");
        inputEl.focus();
      });

      recognition.addEventListener("error", () => {
        isListening = false;
        voiceButton.classList.remove("active");
        setStatus("安全連線中");
        showToast("語音輸入沒有成功，請再試一次");
      });
    }

    async function handleSubmit(event) {
      event.preventDefault();
      const text = inputEl.value.trim();
      if (!text || isSending) return;

      addMessage("user", text);
      inputEl.value = "";
      autosizeInput();
      setSending(true);
      const typingEl = showTyping();

      try {
        const reply = await sendToBackend(text);
        typingEl.remove();
        addMessage("bot", reply);
        setStatus("安全連線中");
      } catch (error) {
        typingEl.remove();
        addMessage("system", normalizeError(error));
        setStatus("連線未完成");
      } finally {
        setSending(false);
      }
    }

    async function sendToBackend(text) {
      const historySource = messages.filter((item) => item.role === "user" || item.role === "bot");
      const lastHistoryItem = historySource[historySource.length - 1];
      if (lastHistoryItem && lastHistoryItem.role === "user" && lastHistoryItem.content === text) historySource.pop();

      const payload = {
        sessionId: getSessionId(),
        message: text,
        history: historySource.slice(-16).map((item) => ({ role: item.role === "bot" ? "assistant" : "user", content: item.content })),
        clientTime: new Date().toISOString(),
        userAgent: navigator.userAgent
      };

      if (window.google && google.script && google.script.run) return callAppsScript(payload);

      const response = await fetch(GAS_ENDPOINT, {
        method: "POST",
        mode: "cors",
        redirect: "follow",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload)
      });

      const raw = await response.text();
      if (!response.ok) throw new Error(`HTTP ${response.status}: ${raw.slice(0, 180)}`);
      return extractReply(raw);
    }

    function callAppsScript(payload) {
      return new Promise((resolve, reject) => {
        google.script.run
          .withSuccessHandler((result) => {
            try { resolve(extractReply(result)); }
            catch (error) { reject(error); }
          })
          .withFailureHandler(reject)
          .chatWithBot(payload);
      });
    }

    function extractReply(result) {
      if (result === null || result === undefined) throw new Error("後端沒有回傳內容");
      if (typeof result === "string") {
        const trimmed = result.trim();
        try { return extractReply(JSON.parse(trimmed)); }
        catch (_) { return stripHtml(trimmed) || "我收到了，只是回覆內容暫時沒有成功顯示。"; }
      }
      if (typeof result === "object") {
        if (result.error) throw new Error(String(result.error));
        const keys = ["reply", "response", "answer", "message", "text", "output", "content", "result"];
        for (const key of keys) {
          if (typeof result[key] === "string" && result[key].trim()) return result[key].trim();
        }
        if (Array.isArray(result.output)) {
          const text = result.output.flatMap((item) => item.content || []).map((part) => part.text || "").join("").trim();
          if (text) return text;
        }
      }
      return String(result).trim();
    }

    function stripHtml(value) {
      const template = document.createElement("template");
      template.innerHTML = value;
      return (template.content.textContent || "").trim();
    }

    function normalizeError(error) {
      const raw = String(error && error.message ? error.message : error);
      if (/Failed to fetch|NetworkError|CORS|Load failed/i.test(raw)) return "目前無法連上 CHATBOT。若你是從本機檔案開啟頁面，建議改由 Google Apps Script 的網頁網址開啟，語音與對話回覆會更穩定。";
      if (/OPENAI|API key|OPEN_API_KEY|OPENAI_API_KEY/i.test(raw)) return "後端尚未讀到 OpenAI 金鑰。請在 Apps Script 的專案屬性中確認 OPENAI_API_KEY 或 OPEN_API_KEY 已設定。";
      return `目前回覆沒有成功送達。${raw}`;
    }

    function addMessage(role, content) {
      const item = { role, content, time: new Date().toISOString() };
      messages.push(item);
      saveMessages();
      renderMessage(item);
      scrollToBottom();
    }

    function renderMessages() {
      messagesEl.innerHTML = "";
      messages.forEach(renderMessage);
      scrollToBottom();
    }

    function renderMessage(item) {
      const wrapper = document.createElement("article");
      wrapper.className = `message ${item.role}`;
      const meta = document.createElement("div");
      meta.className = "meta";
      meta.textContent = `${speakerName(item.role)} · ${formatDateTime(item.time)}`;
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = item.content;
      wrapper.append(meta, bubble);
      messagesEl.append(wrapper);
    }

    function showTyping() {
      const wrapper = document.createElement("article");
      wrapper.className = "message bot";
      wrapper.dataset.typing = "true";
      const meta = document.createElement("div");
      meta.className = "meta";
      meta.textContent = `CHATBOT · ${formatDateTime(new Date().toISOString())}`;
      const bubble = document.createElement("div");
      bubble.className = "bubble typing";
      bubble.innerHTML = "<span></span><span></span><span></span>";
      wrapper.append(meta, bubble);
      messagesEl.append(wrapper);
      scrollToBottom();
      return wrapper;
    }

    function setSending(value) {
      isSending = value;
      sendButton.disabled = value;
      inputEl.disabled = value;
      presenceText.textContent = value ? "正在思考中" : "準備陪你聊聊";
      setStatus(value ? "CHATBOT 正在回覆" : "安全連線中");
    }

    function setStatus(text) { statusText.textContent = text; }
    function autosizeInput() { inputEl.style.height = "auto"; inputEl.style.height = `${Math.min(inputEl.scrollHeight, 160)}px`; }
    function scrollToBottom() { requestAnimationFrame(() => { messagesEl.scrollTop = messagesEl.scrollHeight; }); }
    function speakerName(role) { return role === "user" ? "你" : role === "system" ? "系統" : "CHATBOT"; }
    function formatDateTime(value) { return dateTimeFormatter.format(new Date(value)).replaceAll("/", "-"); }

    function getSessionId() {
      let sessionId = localStorage.getItem(SESSION_KEY);
      if (!sessionId) {
        sessionId = window.crypto && crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(16).slice(2)}`;
        localStorage.setItem(SESSION_KEY, sessionId);
      }
      return sessionId;
    }

    function saveMessages() { localStorage.setItem(STORAGE_KEY, JSON.stringify(messages.slice(-80))); }
    function loadMessages() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
        return Array.isArray(saved) ? saved : [];
      } catch (_) {
        return [];
      }
    }

    function showToast(text) {
      toastEl.textContent = text;
      toastEl.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toastEl.classList.remove("show"), 2600);
    }
  </script>
</body>
</html>
